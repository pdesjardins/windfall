<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Windfall — a turn-based nautical strategy game of exploration and capture-the-flag.">
  <title>Windfall</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/game.css">
</head>
<body>
  <div id="app">
    <header id="top-bar">
      <span id="game-title">Windfall</span>
      <nav id="game-controls">
        <button class="action-btn" id="btn-new-game" type="button">New Game</button>
        <button class="action-btn" id="btn-save" type="button" disabled>Save Game</button>
        <button class="action-btn" id="btn-load" type="button">Load Game</button>
      </nav>
    </header>

    <div id="game-area">
      <main id="canvas-container">
        <canvas id="game-canvas" aria-label="Game map">
          Your browser does not support the HTML canvas element required to play Windfall.
        </canvas>
      </main>

      <aside id="info-panel">
        <div id="turn-controls">
          <div id="turn-counter">Turn: <span id="turn-number">—</span></div>
          <button class="action-btn" id="btn-end-turn" type="button" disabled>Pass</button>
        </div>

        <h2 class="panel-heading">Selected Unit</h2>
        <div id="unit-info">
          <p class="placeholder-text">No unit selected.</p>
        </div>

        <h2 class="panel-heading">Status</h2>
        <div id="status-info">
          <p class="placeholder-text">Start a new game to begin.</p>
        </div>

        <h2 class="panel-heading">Wind</h2>
        <div id="wind-display">
          <div id="wind-face-wrapper">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 82" width="100" height="82" aria-hidden="true">
              <!-- Face silhouette: head (cx=22,cy=40,r=20) + puffed cheek (cx=50,cy=48,r=16) -->
              <path d="M 41 35 A 20 20 0 1 1 36 55 A 16 16 0 1 0 41 35 Z"
                    fill="#e8d5b0" stroke="#6a5a4a" stroke-width="1.5"/>
              <!-- Cheek blush -->
              <ellipse cx="54" cy="51" rx="8" ry="6" fill="#c07060" opacity="0.25"/>
              <!-- Eye, heavy-lidded, squinting from effort -->
              <path d="M 10 33 Q 17 29 24 33" stroke="#6a5a4a" stroke-width="1.5" fill="none" stroke-linecap="round"/>
              <ellipse cx="17" cy="33" rx="1.8" ry="1.3" fill="#6a5a4a"/>
              <!-- Eyebrow, arched with exertion -->
              <path d="M 9 28 Q 17 23 25 27" stroke="#6a5a4a" stroke-width="1.3" fill="none" stroke-linecap="round"/>
              <!-- Nose -->
              <path d="M 22 42 L 20 48 Q 24 51 27 48" stroke="#6a5a4a" stroke-width="0.9" fill="none" stroke-linecap="round"/>
              <!-- Pursed lips at cheek tip -->
              <ellipse cx="65" cy="48" rx="4" ry="2.8" fill="#a06858"/>
              <path d="M 61 48 Q 65 45 69 48 Q 65 51 61 48 Z" fill="#c08878"/>
              <!-- Hair wisps at back and top of head -->
              <path d="M 12 24 C 6 14 4 6 8 1 C 13 5 13 14 12 24" fill="#a07830" stroke="#7a5820" stroke-width="0.7"/>
              <path d="M 20 18 C 18 8 22 1 28 3 C 26 10 23 14 20 18" fill="#a07830" stroke="#7a5820" stroke-width="0.7"/>
              <path d="M 30 14 C 32 5 40 2 42 7 C 38 10 33 12 30 14" fill="#a07830" stroke="#7a5820" stroke-width="0.7"/>
              <path d="M 5 38 C -2 28 -2 18 4 13 C 8 20 7 30 5 38" fill="#a07830" stroke="#7a5820" stroke-width="0.7"/>
              <!-- Wind plumes, five arching lines from lips -->
              <path d="M 69 45 C 78 38 89 35 100 33" stroke="#5a9ab5" stroke-width="2.2" fill="none" stroke-linecap="round"/>
              <path d="M 70 47 C 79 43 90 42 100 41" stroke="#5a9ab5" stroke-width="1.8" fill="none" stroke-linecap="round"/>
              <path d="M 70 48 C 80 48 90 48 100 48" stroke="#5a9ab5" stroke-width="2.2" fill="none" stroke-linecap="round"/>
              <path d="M 70 49 C 79 53 90 54 100 55" stroke="#5a9ab5" stroke-width="1.8" fill="none" stroke-linecap="round"/>
              <path d="M 69 51 C 78 58 89 61 100 63" stroke="#5a9ab5" stroke-width="2.2" fill="none" stroke-linecap="round"/>
            </svg>
          </div>
          <p id="wind-label">—</p>
        </div>
      </aside>
    </div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
